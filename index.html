<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZASTARES AI - Web Araştırmacı</title>
    <style>
        /* Tasarım Değişkenleri */
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --text-color: #c5a059; /* Lüks altın/bronz tonu */
            --accent-color: #45f3ff; /* Neon cyan mavi */
            --border-color: #2c3540;
            --dark-pure: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #e1e1e6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- AÇILIŞ EKRANI (SPLASH SCREEN) STİLLERİ --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.85)), url('acilis.webp') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-title {
            font-size: 2.5rem;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 20px var(--accent-color);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #1a1a1e;
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--accent-color);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- ANA UYGULAMA STİLLERİ --- */
        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            opacity: 0; /* İlk başta gizli, açılıştan sonra görünecek */
            transition: opacity 1s ease;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background-color: var(--container-bg);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 30px;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 18px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(69, 243, 255, 0.2);
        }

        button {
            padding: 0 30px;
            background-color: var(--text-color);
            color: var(--dark-pure);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #e2b767;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #4a5568;
            color: #a0aec0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            font-style: italic;
            color: var(--accent-color);
            margin-bottom: 15px;
            display: none;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .output-box {
            background-color: var(--bg-color);
            padding: 25px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            min-height: 200px;
            line-height: 1.7;
            white-space: pre-wrap;
            font-size: 1.05rem;
            color: #e2e8f0;
        }

        .error {
            color: #ff4a4a !important;
            border-color: #ff4a4a !important;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-title">ZASTARES AI</div>
        <div class="loader"></div>
    </div>

    <div id="main-content">
        <div class="container">
            <h1>Web Araştırma Sistemi</h1>
            
            <div class="search-box">
                <input type="text" id="userInput" placeholder="Yapay zekanın internette derinlemesine araştırıp işlemesini istediğiniz konuyu yazın...">
                <button id="sendBtn">Araştır</button>
            </div>

            <div id="status" class="status">🌐 Sistem internet ağını tarıyor ve bilgileri işliyor...</div>
            
            <div id="output" class="output-box">Araştırma sonuçları ve yapay zeka analizi burada listelenecek...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
                                              </html>
