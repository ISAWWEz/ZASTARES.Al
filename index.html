<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZASTARES AI</title>
    <style>
        /* Arayüz Sabitleri - Hiçbir görsel bozulmadı */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #fff; overflow: hidden; }
        .hidden { display: none !important; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #splash-screen img { max-width: 80%; border-radius: 20px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); }
        #auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; }
        .auth-box { background: #242424; padding: 30px; border-radius: 15px; width: 85%; max-width: 360px; text-align: center; border: 1px solid #333; }
        .auth-box input { width: 90%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background: #333; color: white; outline: none; }
        .auth-box button { width: 100%; padding: 12px; background: #00ffcc; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #main-app { display: flex; height: 100vh; width: 100vw; position: relative; }
        #sidebar { width: 260px; background: #161616; height: 100%; position: absolute; left: -260px; transition: 0.3s; z-index: 1000; border-right: 1px solid #222; }
        #sidebar.open { left: 0; }
        .sidebar-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #1f1f1f; font-size: 14px; }
        #chat-area { flex: 1; display: flex; flex-direction: column; width: 100%; transition: 0.3s; }
        #header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1e1e1e; border-bottom: 1px solid #333; }
        #header-title { color: #00ffcc; font-weight: bold; }
        .icon-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
        #settings-menu { position: absolute; top: 60px; right: 15px; background: #2a2a2a; border-radius: 8px; display: none; z-index: 1001; width: 180px; }
        #settings-menu div { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #333; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px 15px; border-radius: 12px; font-size: 15px; }
        .user-msg { background: #00ffcc; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #2a2a2a; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }
        #input-area { display: flex; padding: 15px; background: #1e1e1e; gap: 10px; }
        #chat-input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #2a2a2a; color: white; outline: none; }
        #send-btn { background: #00ffcc; color: #000; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .creator-tag { text-align: center; font-size: 10px; color: #444; padding: 8px; background: #1a1a1a; }
        .incognito-active { background-color: #1a0000 !important; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="açılış.webp" alt="ZASTARES" onerror="this.parentElement.innerHTML='<h1 style=\'color:#00ffcc\'>ZASTARES AI</h1>'">
    </div>

    <div id="auth-screen" class="hidden">
        <div class="auth-box">
            <h2 style="color: #00ffcc;">ZASTARES AI</h2>
            <div id="login-form">
                <input type="text" id="l-user" placeholder="Kullanıcı Adı">
                <input type="password" id="l-pass" placeholder="Şifre">
                <button id="login-btn">Giriş Yap</button>
                <p onclick="toggleAuth()" style="color:#00ffcc; cursor:pointer; font-size:13px; margin-top:10px;">Hesabınız yok mu? Kaydol</p>
            </div>
            <div id="register-form" class="hidden">
                <input type="text" id="r-user" placeholder="Yeni Kullanıcı Adı">
                <input type="password" id="r-pass" placeholder="Şifre">
                <button id="reg-btn">Kaydol</button>
                <p onclick="toggleAuth()" style="color:#00ffcc; cursor:pointer; font-size:13px; margin-top:10px;">Giriş Yap</p>
            </div>
        </div>
        <div class="creator-tag">YAPIMCI-İSAWWEz-CODLYİNG STUDİOS</div>
    </div>

    <div id="main-app" class="hidden">
        <div id="sidebar">
            <div style="padding:20px; font-size:12px; color:#555;">GEÇMİŞ SOHBETLER</div>
            <div style="background:#3d0000; color:#ff4d4d; margin:15px; padding:12px; border-radius:8px; text-align:center; font-weight:bold; cursor:pointer;" onclick="toggleIncognito()">🕵️ GİZLİ SOHBET</div>
            <div id="history-list"></div>
        </div>
        <div id="chat-area">
            <div id="header">
                <button class="icon-btn" onclick="toggleSidebar()">☰</button>
                <span id="header-title">ZASTARES AI</span>
                <button class="icon-btn" onclick="toggleSettings()">•••</button>
            </div>
            <div id="settings-menu">
                <div onclick="alert('Ayarlar yakında!')">⚙️ Hesap Ayarları</div>
                <div onclick="copyHistory()">📋 Geçmişi Kopyala</div>
                <div onclick="clearHistory()" style="color:#ff4d4d;">🗑️ Geçmişi Sil</div>
            </div>
            <div id="messages">
                <div class="msg ai-msg">Merhaba! Ben ZASTARES AI. Sana nasıl yardımcı olabilirim?</div>
            </div>
            <div id="input-area">
                <input type="text" id="chat-input" placeholder="Mesajınızı yazın...">
                <button id="send-btn">Gönder</button>
            </div>
            <div class="creator-tag">YAPIMCI-İSAWWEz-CODLYİNG STUDİOS</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
