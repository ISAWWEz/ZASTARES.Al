<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyun Lobisi v3</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: sans-serif;
            background: url('lobarka.webp') no-repeat center center fixed;
            background-size: cover; background-color: #f8f8f8; 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .header { width: 90%; display: flex; justify-content: space-between; padding-top: 20px; margin-bottom: 50px; }
        .language { color: #5d9e35; font-weight: bold; font-size: 18px; text-align: center; }
        .flags { font-size: 24px; margin-top: 5px; display: flex; gap: 10px; cursor: pointer; }
        .flags span:hover { transform: scale(1.2); transition: 0.2s; }

        .auth-container { display: flex; align-items: center; gap: 10px; }
        .login-btn, .user-info-btn { 
            background: white; border: 2px solid #5c3a21; color: #5d9e35; 
            padding: 8px 15px; font-size: 16px; font-weight: bold; cursor: pointer; 
        }
        .logout-link { color: #e74c3c; font-size: 12px; cursor: pointer; display: block; text-align: center; margin-top: 4px; }

        .menu-container { display: flex; gap: 50px; margin-bottom: 50px; flex-wrap: wrap; justify-content: center; }
        .column { display: flex; flex-direction: column; gap: 15px; }
        .game-btn { border: 3px solid black; padding: 15px 20px; font-weight: bold; font-size: 14px; cursor: pointer; width: 220px; text-align: center; text-transform: uppercase; }
        .car-btn { background-color: #3498db; color: #d4af37; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .red-btn { background-color: #e74c3c; color: #f1c40f; }
        .mc-btn { background: linear-gradient(to bottom, #5d9e35 45%, #8b5a2b 45%); color: #f1c40f; text-shadow: 1px 1px 2px black; }
        .war-btn { background-color: #f1c40f; color: black; }
        .sim-btn { background-color: #2c3e50; color: #e74c3c; }

        .credits-box { background-color: white; border: 3px solid black; width: 300px; padding: 20px; text-align: center; color: #c0392b; }

        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background-color: #fff; padding: 20px; border: 3px solid #5c3a21; width: 90%; max-width: 380px; border-radius: 10px; position: relative; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 28px; cursor: pointer; color: red; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ccc; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: #5d9e35; border-bottom: 3px solid #5d9e35; }
        .form-section { display: none; flex-direction: column; gap: 12px; }
        .form-section.active { display: flex; }
        input { padding: 12px; font-size: 16px; border: 2px solid #ccc; border-radius: 5px; outline: none; }
        button.submit-btn { background-color: #5d9e35; color: white; padding: 12px; font-size: 18px; border: none; font-weight: bold; cursor: pointer; }

        .criteria-list { font-size: 13px; margin: 0; padding: 0; list-style: none; }
        .criteria { color: #e74c3c; font-weight: bold; transition: 0.3s; }
        .criteria.success { color: #2ecc71; }
    </style>
</head>
<body>

    <div class="header">
        <div class="language">
            <span id="langLabel">DİL</span>
            <div class="flags">
                <span onclick="setLanguage('tr')">🇹🇷</span>
                <span onclick="setLanguage('en')">🇬🇧</span>
            </div>
        </div>
        <div id="authArea" class="auth-container">
            <button id="mainLoginBtn" class="login-btn" onclick="openModal()" data-key="loginMain">OTURUM AÇ</button>
        </div>
    </div>

    <div class="menu-container">
        <div class="column">
            <button class="game-btn car-btn" data-key="carBtn">🚗 ARABA OYUNLAR</button>
            <button class="game-btn red-btn" data-key="redBtn">2 BOYUTLU OYUNLAR</button>
        </div>
        <div class="column">
            <button class="game-btn mc-btn" data-key="mcBtn">MİNECRAFT OYUNLARI</button>
            <button class="game-btn war-btn" data-key="warBtn">SAVAŞ OYUNLARI</button>
            <button class="game-btn sim-btn" data-key="simBtn">CODE SİMÜLATOR</button>
        </div>
    </div>

    <div class="credits-box">
        <h3 data-key="creditsTitle">YAPIMCILAR</h3>
        <p>İSAWWEZ & MARTAKATDJ</p>
        <p><em>CODLYING STUDİOS</em></p>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="tabs">
                <button id="tLogin" class="tab-btn active" onclick="switchTab('loginSec')" data-key="tabLogin">GİRİŞ YAP</button>
                <button id="tReg" class="tab-btn" onclick="switchTab('registerSec')" data-key="tabReg">KAYDOL</button>
            </div>

            <div id="loginSec" class="form-section active">
                <input type="text" id="lNick" placeholder="NİCKİNİZ">
                <input type="password" id="lPass" placeholder="ŞİFRE">
                <button class="submit-btn" onclick="handleLogin()" data-key="loginSubmit">GİRİŞ YAP</button>
            </div>

            <div id="registerSec" class="form-section">
                <input type="text" id="rNick" placeholder="NİCK BELİRLE">
                <input type="password" id="rPass" placeholder="ŞİFRE BELİRLE" oninput="checkCriteria()">
                <ul class="criteria-list">
                    <li id="cLen" class="criteria" data-key="critLen">● 12 Karakter Olmalı</li>
                    <li id="cNum" class="criteria" data-key="critNum">● Rakam İçermeli</li>
                    <li id="cSym" class="criteria" data-key="critSym">● @#₺_ İçermeli</li>
                </ul>
                <button class="submit-btn" onclick="handleRegister()" data-key="regSubmit">KAYDOL</button>
            </div>
        </div>
    </div>

    <script>
        // Dil Sözlüğü
        const translations = {
            tr: {
                langLabel: "DİL",
                loginMain: "OTURUM AÇ",
                carBtn: "🚗 ARABA OYUNLAR",
                redBtn: "2 BOYUTLU OYUNLAR",
                mcBtn: "MİNECRAFT OYUNLARI",
                warBtn: "SAVAŞ OYUNLARI",
                simBtn: "CODE SİMÜLATOR",
                creditsTitle: "YAPIMCILAR",
                tabLogin: "GİRİŞ YAP",
                tabReg: "KAYDOL",
                loginSubmit: "GİRİŞ YAP",
                regSubmit: "KAYDOL",
                critLen: "● 12 Karakter Olmalı",
                critNum: "● Rakam İçermeli",
                critSym: "● @#₺_ İçermeli",
                logout: "Oturumu Kapat",
                nickPH: "NİCKİNİZ",
                passPH: "ŞİFRE",
                regNickPH: "NİCK BELİRLE",
                regPassPH: "ŞİFRE BELİRLE",
                alert1: "Nick geçersiz veya dolu!",
                alert2: "Kriterler yeşil olmalı!",
                alert3: "Kaydolma başarılı!",
                alert4: "Hatalı nick veya şifre!"
            },
            en: {
                langLabel: "LANGUAGE",
                loginMain: "LOGIN",
                carBtn: "🚗 CAR GAMES",
                redBtn: "2D GAMES",
                mcBtn: "MINECRAFT GAMES",
                warBtn: "WAR GAMES",
                simBtn: "CODE SIMULATOR",
                creditsTitle: "DEVELOPERS",
                tabLogin: "LOGIN",
                tabReg: "REGISTER",
                loginSubmit: "LOGIN",
                regSubmit: "REGISTER",
                critLen: "● Must be 12 Characters",
                critNum: "● Must Contain Numbers",
                critSym: "● Must Contain @#₺_",
                logout: "Logout",
                nickPH: "YOUR NICKNAME",
                passPH: "PASSWORD",
                regNickPH: "SET NICKNAME",
                regPassPH: "SET PASSWORD",
                alert1: "Nickname invalid or taken!",
                alert2: "Criteria must be green!",
                alert3: "Registration successful!",
                alert4: "Wrong nickname or password!"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'tr';
        let db = JSON.parse(localStorage.getItem('oyuncuVeritabani')) || {};
        let currentUser = localStorage.getItem('currentUser') || null;

        window.onload = () => {
            updateUI();
            setLanguage(currentLang);
        };

        // Dili Değiştirme Fonksiyonu
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            
            document.getElementById('langLabel').innerText = translations[lang].langLabel;
            
            // Tüm data-key olan elementleri güncelle
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                el.innerText = translations[lang][key];
            });

            // Placeholderları güncelle
            document.getElementById('lNick').placeholder = translations[lang].nickPH;
            document.getElementById('lPass').placeholder = translations[lang].passPH;
            document.getElementById('rNick').placeholder = translations[lang].regNickPH;
            document.getElementById('rPass').placeholder = translations[lang].regPassPH;
            
            updateUI(); // Giriş yapılmışsa orayı da güncelle
        }

        function openModal() { document.getElementById('authModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('authModal').style.display = 'none'; }

        function switchTab(id) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        function checkCriteria() {
            const val = document.getElementById('rPass').value;
            const isLen = val.length >= 12;
            const isNum = /\d/.test(val);
            const isSym = /[@#₺_]/.test(val);
            updateColor('cLen', isLen);
            updateColor('cNum', isNum);
            updateColor('cSym', isSym);
            return isLen && isNum && isSym;
        }

        function updateColor(id, success) {
            const el = document.getElementById(id);
            if(success) el.classList.add('success');
            else el.classList.remove('success');
        }

        function handleRegister() {
            const nick = document.getElementById('rNick').value.trim();
            const pass = document.getElementById('rPass').value;
            const lang = translations[currentLang];

            if(!nick || db[nick]) return alert(lang.alert1);
            if(!checkCriteria()) return alert(lang.alert2);

            db[nick] = { password: pass };
            localStorage.setItem('oyuncuVeritabani', JSON.stringify(db));
            alert(lang.alert3);
            switchTab('loginSec');
        }

        function handleLogin() {
            const nick = document.getElementById('lNick').value.trim();
            const pass = document.getElementById('lPass').value;
            const lang = translations[currentLang];

            if(db[nick] && db[nick].password === pass) {
                currentUser = nick;
                localStorage.setItem('currentUser', nick);
                updateUI();
                closeModal();
            } else {
                alert(lang.alert4);
            }
        }

        function updateUI() {
            const authArea = document.getElementById('authArea');
            const lang = translations[currentLang];
            if(currentUser) {
                authArea.innerHTML = `
                    <div style="text-align:center">
                        <div class="user-info-btn">${currentUser.toUpperCase()}</div>
                        <span class="logout-link" onclick="logout()">${lang.logout}</span>
                    </div>
                `;
            } else {
                authArea.innerHTML = `<button class="login-btn" onclick="openModal()">${lang.loginMain}</button>`;
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            updateUI();
            location.reload();
        }
    </script>
</body>
    </html>
